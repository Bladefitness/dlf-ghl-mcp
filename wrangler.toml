name = "dlf-agency"
account_id = "203c62d7e81cfe8c46a8321623014797"
main = "src/index.ts"
compatibility_date = "2025-03-14"
compatibility_flags = ["nodejs_compat"]

# -----------------------------------------------------------------------
# Secrets — set via `wrangler secret put <NAME>`, never hardcode values
# -----------------------------------------------------------------------
#
# Legacy / fallback (sub-account scoped Private Integration token):
#   GHL_API_KEY          — Private Integration token for the default sub-account
#   GHL_LOCATION_ID      — Default GHL Location ID
#
# App 1 — Agency Private Integration
#   Scope: snapshots, companies, custom menus, users, locations, SaaS
#   GHL_AGENCY_CLIENT_ID     — Client ID of the agency-scoped GHL app
#   GHL_AGENCY_CLIENT_SECRET — Client Secret of the agency-scoped GHL app
#
# App 2 — Sub-Account Private Integration
#   Scope: contacts, conversations, calendars, payments, opportunities,
#          products, social, marketing, funnels, blogs, custom objects,
#          AI agents, knowledge base, and all other sub-account tools
#   GHL_SUB_CLIENT_ID        — Client ID of the sub-account-scoped GHL app
#   GHL_SUB_CLIENT_SECRET    — Client Secret of the sub-account-scoped GHL app
#
# Optional:
#   ERROR_WEBHOOK_URL    — Webhook URL to receive error reports
# -----------------------------------------------------------------------

[durable_objects]
bindings = [{ name = "MCP_OBJECT", class_name = "GHLMcpAgent" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GHLMcpAgent"]

[[migrations]]
tag = "v2"
new_sqlite_classes = []

[[d1_databases]]
binding = "GHL_DB"
database_name = "ghl-accounts"
database_id = "647917a2-ace2-4b98-a10f-f822c5678646"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "ac787b89a4014510af5bf1e5e56f88f5"
